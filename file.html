// ==================== 글로벌 libsodium 확인 ====================

  alert('libsodium 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하세요.');
}

// ==================== 유틸 ====================
const encoder = new TextEncoder(), decoder = new TextDecoder();
function concat(...arrs) { let len = arrs.reduce((a,b)=>a+b.length,0), r = new Uint8Array(len), off=0; for(let a of arrs){ r.set(a,off); off+=a.length; } return r; }
function formatSize(b) { if(!b) return '0 B'; const k=1024, s=['B','KB','MB','GB','TB']; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i]; }
function shannonEntropy(b) { if(!b||!b.length) return 0; const c=new Array(256).fill(0); for(let x of b)c[x]++; let e=0; for(let v of c)if(v){let p=v/b.length; e-=p*Math.log2(p);} return e; }

// BufferedStreamReader
class BufferedStreamReader {
  constructor(s) { this.reader = s.getReader(); this.buffer = new Uint8Array(0); }
  async readExactly(n) { while(this.buffer.length<n){ let{done,value}=await this.reader.read(); if(done) throw new Error('EOF'); this.buffer=concat(this.buffer,value); } const r=this.buffer.slice(0,n); this.buffer=this.buffer.slice(n); return r; }
  async readSome() { if(this.buffer.length){ const r=this.buffer; this.buffer=new Uint8Array(0); return r; } const{done,value}=await this.reader.read(); return done?null:value; }
}

function mnemonicToEntropy(m) { const w=m.trim().split(/\s+/); if(w.length!==24) throw new Error('24단어 필요'); let bits=''; for(let x of w){ let i=WORDLIST.indexOf(x); if(i===-1) throw new Error('유효하지 않은 단어'); bits+=i.toString(2).padStart(11,'0'); } return {entropy:new Uint8Array(Array.from({length:32},(_,i)=>parseInt(bits.substr(i*8,8),2))), checksum:bits.substring(256)}; }
async function validateMnemonic(m) { try{ let{entropy,checksum}=mnemonicToEntropy(m); let h=new Uint8Array(await crypto.subtle.digest('SHA-256',entropy)); return checksum===h[0].toString(2).padStart(8,'0').substring(0,8); }catch{return false;} }
async function generateMnemonic() { await ensureSodium(); let e=libsodium.randombytes_buf(32); let h=new Uint8Array(await crypto.subtle.digest('SHA-256',e)); let bits=''; for(let b of e)bits+=b.toString(2).padStart(8,'0'); bits+=h[0].toString(2).padStart(8,'0').substring(0,8); let w=[]; for(let i=0;i<bits.length;i+=11)w.push(WORDLIST[parseInt(bits.substring(i,i+11),2)]); return w.join(' '); }
async function mnemonicToSeed(m) { let b=encoder.encode(m.normalize('NFKD')), s=encoder.encode('mnemonic'); let k=await crypto.subtle.importKey('raw',b,{name:'PBKDF2'},false,['deriveBits']); return new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2',salt:s,iterations:2048,hash:'SHA-512'},k,512)); }

// ==================== libsodium wrapper ====================
let sodiumReady = false;
async function ensureSodium() {
  if (!sodiumReady) {
    await libsodium.ready;
    sodiumReady = true;
  }
}

const ARGON_PRESETS={moderate:{ops:3,mem:64<<10},high:{ops:5,mem:256<<10},extreme:{ops:7,mem:512<<10},ultimate:{ops:10,mem:1024<<10}};
async function argon2Hash(pw,salt,preset){ await ensureSodium(); let p=ARGON_PRESETS[preset]||ARGON_PRESETS.extreme; return libsodium.crypto_pwhash(32,pw,salt,p.ops,p.mem,libsodium.crypto_pwhash.ALG_ARGON2ID13); }
async function hkdf(ikm,salt,info,len){ let k=await crypto.subtle.importKey('raw',ikm,{name:'HKDF'},false,['deriveBits']); return new Uint8Array(await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-256',salt,info:encoder.encode(info)},k,len*8)); }
async function keyfileHMAC(buf,salt){ let k=await crypto.subtle.importKey('raw',buf,{name:'HMAC',hash:'SHA-256'},false,['sign']); return new Uint8Array(await crypto.subtle.sign('HMAC',k,salt)); }
async function deriveWrappingKey(pw,salt,sec,pre){ let pwk=await argon2Hash(pw,salt,pre); let k2; if(sec instanceof Uint8Array) k2=await keyfileHMAC(sec,salt); else{ let s=await mnemonicToSeed(sec); k2=s.slice(0,32); } let ikm=concat(pwk,k2); pwk.fill(0);k2.fill(0); let wk=await hkdf(ikm,salt,'uooo-wrap-v1',32); ikm.fill(0); return wk; }
async function wrapFEK(fek,wk){ await ensureSodium(); let n=libsodium.randombytes_buf(libsodium.crypto_aead_xchacha20poly1305_ietf.NPUBBYTES); let w=libsodium.crypto_aead_xchacha20poly1305_ietf.encrypt(fek,null,null,n,wk); return{nonce:n,wrapped:w}; }
async function unwrapFEK(w,n,wk){ await ensureSodium(); return libsodium.crypto_aead_xchacha20poly1305_ietf.decrypt(w,null,null,n,wk); }

const CHUNK_SIZE=256*1024;
function createEncStream(fek){ let h=libsodium.randombytes_buf(libsodium.crypto_secretstream_xchacha20poly1305.HEADERBYTES); let s=libsodium.crypto_secretstream_xchacha20poly1305.init_push(h,fek); return{header:h,push(c,t){return libsodium.crypto_secretstream_xchacha20poly1305.push(s,c,null,t);}}; }
function createDecStream(h,fek){ let s=libsodium.crypto_secretstream_xchacha20poly1305.init_pull(h,fek); return{pull(c){return libsodium.crypto_secretstream_xchacha20poly1305.pull(s,c);}}; }

async function* archiveStream(files){ for(let f of files){ let nb=encoder.encode(f.path); yield new Uint8Array(new Uint16Array([nb.length]).buffer); yield nb; let s=BigInt(f.file.size), sb=new Uint8Array(8); new DataView(sb.buffer).setBigUint64(0,s,true); yield sb; let r=f.file.stream().getReader(); while(true){let{done,value}=await r.read(); if(done)break; yield value;}} yield new Uint16Array([0]).buffer; }
function tarHeader(fn,size){ let b=new Uint8Array(512), n=encoder.encode(fn); b.set(n.slice(0,100),0); b.set(encoder.encode('0000600\0'),100); b.set(encoder.encode('0000000\0'),108); b.set(encoder.encode('0000000\0'),116); b.set(encoder.encode(size.toString(8).padStart(11,'0')+'\0'),124); b.set(encoder.encode('00000000000\0'),136); b[156]=0x30; let s=8*32; for(let i=0;i<148;i++)s+=b[i]; for(let i=156;i<512;i++)s+=b[i]; b.set(encoder.encode(s.toString(8).padStart(6,'0')+'\0 '),148); return b; }
async function* tarFromEntries(entries){ for await(let e of entries){ yield tarHeader(e.fileName,e.fileSize); let r=e.bodyStream.getReader(), rem=e.fileSize; while(rem>0){let{done,value}=await r.read(); if(done)break; yield value; rem-=value.length;} let pad=(512-(e.fileSize%512))%512; if(pad)yield new Uint8Array(pad); } yield new Uint8Array(1024); }
class ArchiveReader{ constructor(r){this.reader=r;} async *entries(){ while(true){ let nl=new Uint16Array((await this.reader.readExactly(2)).buffer.slice(0,2))[0]; if(nl===0)break; let nb=await this.reader.readExactly(nl), fn=decoder.decode(nb); let sb=await this.reader.readExactly(8), fs=Number(new DataView(sb.buffer.slice(0,8)).getBigUint64(0,true)); let self=this; let body=new ReadableStream({async start(c){ let rem=fs; while(rem>0){ let ch=await self.reader.readSome(); if(!ch){c.error(new Error('파일 부족'));return;} if(ch.length<=rem){c.enqueue(ch);rem-=ch.length;}else{c.enqueue(ch.slice(0,rem));self.reader.buffer=concat(ch.slice(rem),self.reader.buffer);rem=0;} } c.close(); }}); yield{fileName:fn,fileSize:fs,bodyStream:body}; } } }

// ==================== UI 이벤트 (DOM 로드 후 실행) ====================
window.addEventListener('DOMContentLoaded', () => {
  // 요소 참조
  const tabs = document.querySelector('.tabs');
  const panelEncrypt = document.getElementById('panelEncrypt');
  const panelDecrypt = document.getElementById('panelDecrypt');
  const tabEncrypt = document.querySelector('[data-tab="encrypt"]');
  const tabDecrypt = document.querySelector('[data-tab="decrypt"]');

  // 탭 전환
  tabs.addEventListener('click', (e) => {
    if (e.target.classList.contains('tab')) {
      const mode = e.target.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      panelEncrypt.classList.toggle('active', mode === 'encrypt');
      panelDecrypt.classList.toggle('active', mode === 'decrypt');
    }
  });

  // 비밀번호 표시
  document.getElementById('showEncPw').addEventListener('change', function() { document.getElementById('encPassword').type = this.checked ? 'text' : 'password'; });
  document.getElementById('showDecPw').addEventListener('change', function() { document.getElementById('decPassword').type = this.checked ? 'text' : 'password'; });

  // 인증 방식 UI
  document.getElementById('authModeEnc').addEventListener('change', function() {
    document.getElementById('keyfileBoxEnc').classList.toggle('hidden', this.value !== 'keyfile');
    document.getElementById('mnemonicBoxEnc').classList.toggle('hidden', this.value !== 'mnemonic');
  });
  document.getElementById('authModeDec').addEventListener('change', function() {
    document.getElementById('keyfileBoxDec').classList.toggle('hidden', this.value !== 'keyfile');
    document.getElementById('mnemonicBoxDec').classList.toggle('hidden', this.value !== 'mnemonic');
  });

  // 비밀번호 강도
  document.getElementById('encPassword').addEventListener('input', function() {
    const pw = this.value; let score = 0;
    if(pw.length >= 8) score++; if(pw.length >= 12) score++;
    if(/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if(/\d/.test(pw)) score++; if(/[^A-Za-z0-9]/.test(pw)) score++;
    const bar = document.getElementById('pwStrengthEnc'), txt = document.getElementById('pwStrengthTextEnc');
    bar.style.width = (score * 20) + '%';
    if (score < 2) { bar.style.background = 'var(--red)'; txt.textContent = '약함'; }
    else if (score < 4) { bar.style.background = 'var(--yellow)'; txt.textContent = '보통'; }
    else { bar.style.background = 'var(--green)'; txt.textContent = '강력함'; }
  });

  // 파일 목록 UI
  let encFiles = [];
  function updateFileList() {
    const ul = document.getElementById('fileListEnc');
    ul.innerHTML = encFiles.map(f => `<li><span>${f.path}</span><span class="size">${formatSize(f.file.size)}</span></li>`).join('');
    document.getElementById('totalSizeEnc').textContent = `총 ${encFiles.length}개 파일, ${formatSize(encFiles.reduce((a,b)=>a+b.file.size,0))}`;
  }

  document.getElementById('addFilesEnc').addEventListener('click', () => {
    const inp = document.createElement('input'); inp.type='file'; inp.multiple=true;
    inp.onchange = () => { for(let f of inp.files) encFiles.push({file:f, path:f.name}); updateFileList(); };
    inp.click();
  });
  document.getElementById('addFolderEnc').addEventListener('click', async () => {
    try {
      const dir = await window.showDirectoryPicker(); encFiles = [];
      const walk = async (dh, pp) => { for await (const e of dh.values()) { const p=pp+e.name; if(e.kind==='file'){ const f=await e.getFile(); encFiles.push({file:f,path:p}); } else if(e.kind==='directory') await walk(e, p+'/'); } };
      await walk(dir, '');
      updateFileList();
    } catch(e) { if(e.name !== 'AbortError') alert('폴더 선택이 지원되지 않는 브라우저입니다.'); }
  });
  document.getElementById('clearFilesEnc').addEventListener('click', () => { encFiles = []; updateFileList(); });

  // 드래그 앤 드롭
  const dropZone = document.getElementById('dropZoneEnc');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', async e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const items = e.dataTransfer.items;
    if (!items) return;
    const walk = async (entry, pp) => {
      if (entry.isFile) {
        const file = await new Promise(res => entry.file(res));
        encFiles.push({file, path: pp + '/' + entry.name});
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const readAll = () => new Promise((res, rej) => { const all=[]; const read=()=>reader.readEntries(e=>{ if(e.length){ all.push(...e); read(); } else res(all); }, rej); read(); });
        const entries = await readAll();
        for (const e of entries) await walk(e, pp + '/' + entry.name);
      }
    };
    for (let i=0; i<items.length; i++) {
      const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
      if (entry) await walk(entry, '');
    }
    updateFileList();
  });

  // 복호화 폴더 선택
  let decOutputDirHandle = null;
  document.getElementById('selectOutputDirDec').addEventListener('click', async () => {
    try {
      decOutputDirHandle = await window.showDirectoryPicker();
      document.getElementById('outputDirDecPath').textContent = '📁 ' + decOutputDirHandle.name;
    } catch(e) { if(e.name!=='AbortError') alert('폴더 선택 불가, TAR 다운로드됩니다.'); }
  });

  // 키 파일 / 복구 구문 생성
  document.getElementById('genKeyfileEnc').addEventListener('click', async () => {
    await ensureSodium(); const buf = libsodium.randombytes_buf(512);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([buf])); a.download = 'uooo_keyfile.key'; a.click();
  });
  document.getElementById('genMnemonicEnc').addEventListener('click', async () => {
    await ensureSodium(); const m = await generateMnemonic();
    document.getElementById('mnemonicEnc').value = m; alert('복구 구문 생성됨. 안전하게 보관하세요.');
  });

  // 암호화 메인
  let abortController = null;
  document.getElementById('encryptBtn').addEventListener('click', startEncrypt);
  document.getElementById('cancelEncryptBtn').addEventListener('click', () => { if(abortController) abortController.abort(); });

  async function startEncrypt() {
    if (!encFiles.length) return alert('파일을 추가하세요.');
    const pw = document.getElementById('encPassword').value; if (!pw) return alert('비밀번호 입력');
    const preset = document.getElementById('argonPresetEnc').value;
    const mode = document.getElementById('authModeEnc').value;
    let second;
    if (mode === 'keyfile') {
      const f = document.getElementById('keyfileEnc').files[0]; if (!f) return alert('키 파일 선택');
      second = new Uint8Array(await f.arrayBuffer());
      if (second.length < 512) return alert('512B 이상 키 파일 필요');
      const ent = shannonEntropy(second);
      document.getElementById('keyfileInfoEnc').textContent = `엔트로피: ${ent.toFixed(1)}`;
      if (ent < 6.5 && !confirm(`엔트로피 낮음(${ent.toFixed(1)}). 계속?`)) return;
    } else {
      const m = document.getElementById('mnemonicEnc').value.trim();
      if (!m || !(await validateMnemonic(m))) return alert('유효한 24단어 복구 구문 필요');
      second = m;
    }

    const status = document.getElementById('statusEnc'), prog = document.getElementById('progressEnc');
    const cancelBtn = document.getElementById('cancelEncryptBtn'), startBtn = document.getElementById('encryptBtn');
    status.textContent = ''; prog.value = 0; prog.classList.remove('hidden'); cancelBtn.classList.remove('hidden'); startBtn.disabled = true;
    abortController = new AbortController(); const signal = abortController.signal;

    try {
      await ensureSodium();
      const salt = libsodium.randombytes_buf(16), fek = libsodium.randombytes_buf(32);
      const wkey = await deriveWrappingKey(pw, salt, second, preset);
      const {nonce: wnonce, wrapped} = await wrapFEK(fek, wkey); wkey.fill(0);
      const {header: sh, push} = createEncStream(fek); fek.fill(0);

      let writer;
      if (typeof window.showSaveFilePicker === 'function') {
        try {
          const handle = await window.showSaveFilePicker({ suggestedName: 'encrypted.uooo' });
          writer = (await handle.createWritable()).getWriter();
        } catch (e) { writer = streamSaver.createWriteStream('encrypted.uooo').getWriter(); }
      } else {
        writer = streamSaver.createWriteStream('encrypted.uooo').getWriter();
      }

      const magic = encoder.encode('UOOO'), ver = new Uint8Array([1]), wlenBuf = new Uint16Array([wrapped.length]);
      await writer.write(magic); await writer.write(ver); await writer.write(salt);
      await writer.write(wnonce); await writer.write(new Uint8Array(wlenBuf.buffer)); await writer.write(wrapped);
      await writer.write(sh);

      const totalBytes = encFiles.reduce((s,f) => s+f.file.size, 0); let processed = 0;
      status.textContent = '암호화 중...';
      for await (const chunk of archiveStream(encFiles)) {
        if (signal.aborted) break;
        for (let off=0; off<chunk.byteLength; off+=CHUNK_SIZE) {
          const end = Math.min(off+CHUNK_SIZE, chunk.byteLength);
          const c = new Uint8Array(chunk.buffer.slice(off, end));
          const encChunk = push(c, libsodium.crypto_secretstream_xchacha20poly1305.TAG_MESSAGE);
          const flen = new Uint32Array([encChunk.length]);
          await writer.write(new Uint8Array(flen.buffer)); await writer.write(encChunk);
          processed += c.length;
          prog.value = Math.min(100, Math.round(processed / totalBytes * 100));
        }
      }
      const finalEnc = push(new Uint8Array(0), libsodium.crypto_secretstream_xchacha20poly1305.TAG_FINAL);
      const finalFlen = new Uint32Array([finalEnc.length]);
      await writer.write(new Uint8Array(finalFlen.buffer)); await writer.write(finalEnc);
      await writer.close();
      status.textContent = '✅ 암호화 완료'; prog.value = 100;
    } catch (e) {
      if (e.name === 'AbortError') status.textContent = '⏹️ 중단됨';
      else status.textContent = '❌ 오류: ' + e.message;
    } finally {
      startBtn.disabled = false; cancelBtn.classList.add('hidden'); abortController = null;
      encFiles = []; updateFileList();
      setTimeout(() => prog.classList.add('hidden'), 2000);
    }
  }

  // 복호화 메인
  document.getElementById('decryptBtn').addEventListener('click', startDecrypt);
  document.getElementById('cancelDecryptBtn').addEventListener('click', () => { if(abortController) abortController.abort(); });

  async function startDecrypt() {
    const vaultFile = document.getElementById('vaultFileDec').files[0]; if (!vaultFile) return alert('.uooo 파일 선택');
    const pw = document.getElementById('decPassword').value; if (!pw) return alert('비밀번호 입력');
    const preset = document.getElementById('argonPresetDec').value;
    const mode = document.getElementById('authModeDec').value;
    let second;
    if (mode === 'keyfile') {
      const f = document.getElementById('keyfileDec').files[0]; if (!f) return alert('키 파일 선택');
      second = new Uint8Array(await f.arrayBuffer());
    } else {
      const m = document.getElementById('mnemonicDec').value.trim();
      if (!m || !(await validateMnemonic(m))) return alert('유효한 24단어 복구 구문 필요');
      second = m;
    }

    const status = document.getElementById('statusDec'), prog = document.getElementById('progressDec');
    const cancelBtn = document.getElementById('cancelDecryptBtn'), startBtn = document.getElementById('decryptBtn');
    status.textContent = ''; prog.value = 0; prog.classList.remove('hidden'); cancelBtn.classList.remove('hidden'); startBtn.disabled = true;
    abortController = new AbortController(); const signal = abortController.signal;

    try {
      await ensureSodium();
      const reader = new BufferedStreamReader(vaultFile.stream());
      const magic = await reader.readExactly(4); if (decoder.decode(magic) !== 'UOOO') throw new Error('올바른 uooo 파일 아님');
      const ver = await reader.readExactly(1); if (ver[0] !== 1) throw new Error('지원되지 않는 버전');
      const salt = await reader.readExactly(16);
      const wnonce = await reader.readExactly(libsodium.crypto_aead_xchacha20poly1305_ietf.NPUBBYTES);
      const wlen = new Uint16Array((await reader.readExactly(2)).buffer)[0];
      const wrapped = await reader.readExactly(wlen);
      const sh = await reader.readExactly(libsodium.crypto_secretstream_xchacha20poly1305.HEADERBYTES);

      const wkey = await deriveWrappingKey(pw, salt, second, preset);
      const fek = await unwrapFEK(wrapped, wnonce, wkey); wkey.fill(0);
      const ds = createDecStream(sh, fek); fek.fill(0);

      const plainReadable = new ReadableStream({
        async start(controller) {
          try {
            while (true) {
              if (signal.aborted) { controller.error(new DOMException('Aborted','AbortError')); return; }
              const lenBuf = await reader.readExactly(4);
              const frameLen = new Uint32Array(lenBuf.buffer.slice(lenBuf.byteOffset, lenBuf.byteOffset+4))[0];
              const cipher = await reader.readExactly(frameLen);
              const plain = ds.pull(cipher);
              if (plain && plain.length) controller.enqueue(plain);
            }
          } catch (e) {
            if (e.message.includes('EOF')) controller.close();
            else controller.error(e);
          }
        }
      });

      const archive = new ArchiveReader(new BufferedStreamReader(plainReadable));
      status.textContent = '복호화 중...';
      if (decOutputDirHandle) {
        for await (const entry of archive.entries()) {
          if (signal.aborted) break;
          const parts = entry.fileName.split('/'); let cur = decOutputDirHandle;
          for (let i=0; i<parts.length-1; i++) cur = await cur.getDirectoryHandle(parts[i], {create:true});
          const fh = await cur.getFileHandle(parts[parts.length-1], {create:true});
          const w = await fh.createWritable();
          await entry.bodyStream.pipeTo(w);
        }
        status.textContent = '✅ 복호화 완료 (폴더 저장)';
      } else {
        const writer = streamSaver.createWriteStream('decrypted.tar').getWriter();
        for await (const chunk of tarFromEntries(archive.entries())) {
          if (signal.aborted) break;
          await writer.write(chunk);
        }
        await writer.close();
        status.textContent = '✅ 복호화 완료 (TAR 다운로드)';
      }
    } catch (e) {
      if (e.name === 'AbortError') status.textContent = '⏹️ 중단됨';
      else status.textContent = '❌ 오류: ' + e.message;
    } finally {
      startBtn.disabled = false; cancelBtn.classList.add('hidden'); abortController = null;
      setTimeout(() => prog.classList.add('hidden'), 2000);
    }
  }
});
</script>
